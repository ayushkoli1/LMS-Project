<!DOCTYPE html>
<html>
<head>
    <title>Create Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function addQuestion() {
            const container = document.getElementById('questions-container');
            const index = container.children.length;
            const questionHTML = `
                <div class="mb-3 border p-3 rounded">
                    <label for="question${index}" class="form-label">Question ${index + 1}</label>
                    <input type="text" class="form-control" name="question" id="question${index}" required>
                    <label for="option${index}" class="form-label mt-2">Options (separate by semicolon ; )</label>
                    <input type="text" class="form-control" name="option" id="option${index}" required>
                    <label for="answer${index}" class="form-label mt-2">Correct Answer</label>
                    <input type="text" class="form-control" name="answer" id="answer${index}" required>
                </div>
            `;
            const div = document.createElement('div');
            div.innerHTML = questionHTML;
            container.appendChild(div);
        }
    </script>
</head>
<body>
<div class="container mt-4">
    <h2>Create Quiz for Subject</h2>
    <form method="POST" action="{{ url_for('create_quiz') }}">
        <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <select class="form-select" id="subject" name="subject" required>
                <option value="" disabled selected>Select a subject</option>
                {% for title in course_titles %}
                <option value="{{ title }}">{{ title }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="questions-container">
            <div class="mb-3 border p-3 rounded">
                <label for="question0" class="form-label">Question 1</label>
                <input type="text" class="form-control" name="question" id="question0" required>
                <label for="option0" class="form-label mt-2">Options (separate by semicolon ; )</label>
                <input type="text" class="form-control" name="option" id="option0" required>
                <label for="answer0" class="form-label mt-2">Correct Answer</label>
                <input type="text" class="form-control" name="answer" id="answer0" required>
            </div>
        </div>
        <button type="button" class="btn btn-secondary mb-3" onclick="addQuestion()">Add Another Question</button>
        <br>
        <button type="submit" class="btn btn-primary">Create Quiz</button>
        <a href="{{ url_for('instructor_dashboard') }}" class="btn btn-link">Cancel</a>
    </form>
</div>
</body>
</html>
