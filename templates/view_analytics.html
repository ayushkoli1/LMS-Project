<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Analytics | LMS System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="text-primary mb-4"><i class="bi bi-graph-up"></i> Course Analytics</h2>

    <div class="row text-center">
      <div class="col-md-3 mb-3">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Total Courses</h5>
            <h3 class="text-primary">{{ total_courses }}</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Total Students</h5>
            <h3 class="text-success">{{ total_students }}</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Total Quizzes</h5>
            <h3 class="text-warning">{{ total_quizzes }}</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Total Enrollments</h5>
            <h3 class="text-info">{{ total_enrollments }}</h3>
          </div>
        </div>
      </div>
    </div>

    <a href="{{ url_for('instructor_dashboard') }}" class="btn btn-secondary mt-4">⬅ Back to Dashboard</a>
  </div>
</body>
</html>
