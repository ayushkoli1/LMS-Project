{% extends 'admin_base.html' %}
{% block content %}
<h2 class="text-center mt-3">Add New Assignment</h2>
<form method="POST" class="w-50 mx-auto mt-4">
    <div class="mb-3">
        <label>Title:</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Description:</label>
        <textarea name="description" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
        <label>Course:</label>
        <input type="text" name="course" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Due Date:</label>
        <input type="date" name="due_date" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Uploaded By:</label>
        <input type="email" name="uploaded_by" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Add Assignment</button>
</form>
{% endblock %}
