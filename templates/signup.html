<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | LMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #74ebd5, #acb6e5);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.signup-box {
    background: #fff;
    padding: 40px 35px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    width: 420px;
    text-align: center;
}

h2 {
    margin-bottom: 25px;
    color: #2c3e50;
}

.input-group {
    position: relative;
    margin-bottom: 18px;
}

.input-group i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
    font-size: 14px;
}

input, select {
    width: 100%;
    height: 44px;
    padding: 0 40px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
}

.toggle-password {
    position: absolute;
    right: 1px;
    top: 50%;
    transform: translateX(0.5px) translateY(-50%);
    cursor: pointer;
    color: #777;
}

.btn {
    margin-top: 10px;
    background: linear-gradient(to right,#36d1dc,#5b86e5);
    color: white;
    height: 45px;
    width: 100%;
    border: none;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.bottom-link {
    margin-top: 15px;
    font-size: 14px;
}

.bottom-link a {
    color: #3498db;
    text-decoration: none;
}
</style>
</head>
<body>
<div class="signup-box">
    <h2><i class="fas fa-user-plus"></i> Create Your Account</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('signup') }}">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" id="password" placeholder="Set Password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>
        <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <select name="role" required>
                <option value="">-- Select Role --</option>
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
            </select>
        </div>
        <div class="input-group">
            <i class="fas fa-briefcase"></i>
            <select name="background" required>
                <option value="">-- Select Background --</option>
                <option value="IT">IT</option>
                <option value="Non-IT">Non-IT</option>
            </select>
        </div>

        <button class="btn" type="submit"><i class="fas fa-sign-in-alt"></i> Sign Up</button>
    </form>

    <div class="bottom-link">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const icon = document.querySelector(".toggle-password");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            passwordInput.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script>
</body>
</html>
