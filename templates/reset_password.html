<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff7a18;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#ff5500;
}
</style>
</head>
<body>

<div class="card">
    <h2>Reset Password</h2>
    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <input type="password" name="password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
    </form>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
