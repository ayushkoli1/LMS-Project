<!DOCTYPE html>
<html>
<head>
    <title>Parent Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin: 15px 0;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: transparent;
        }

        .tabs .active {
            background: white;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .otp-btn {
            width: 100%;
            padding: 12px;
            background: #2d4ea2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .otp-btn:hover {
            background: #1f3c80;
        }
    </style>

</head>
<body>

<div class="center">
    <div class="login-card">

        <div class="icon">🎓</div>

        <h2>Parent Portal</h2>
        <p>Access your child's academic progress securely</p>

        <form method="POST" action="/send-otp">

            <h3>Sign In</h3>
            <p>Choose your preferred login method</p>

            <div class="tabs">
                <button type="button" class="active">Email</button>
                <button type="button">Phone</button>
            </div>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="parent@example.com" required>

            <button type="submit" class="otp-btn">Send OTP</button>

        </form>

    </div>
</div>

</body>
</html>
