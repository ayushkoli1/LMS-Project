<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ action }} User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ✅ Correct Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: 'Poppins', sans-serif;
            color: #0d47a1;
        }
        .container {
            max-width: 500px;
            margin-top: 70px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #1565c0;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }
        .btn-primary {
            background-color: #1565c0;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #0d47a1;
        }
        .form-control {
            border-radius: 10px;
        }
        .password-box {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 30px;
            top: 70%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1565c0;
            font-size: 1.2rem;
        }
        .back-btn {
            background-color: #90caf9;
            color: #0d47a1;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #64b5f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">{{ action }} User</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="Name" class="form-label">Name</label>
                        <input type="text" name="Name" id="Name" class="form-control" required 
                               value="{{ user.Name if user else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="Email" class="form-label">Email</label>
                        <input type="email" name="Email" id="Email" class="form-control" required 
                               value="{{ user.Email if user else '' }}">
                    </div>
                    <div class="mb-3 password-box">
                        <label for="Password" class="form-label">Password</label>
                        <input type="password" name="Password" id="Password" class="form-control" required 
                               value="{{ user.Password if user else '' }}">
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                    <div class="mb-3">
                        <label for="Role" class="form-label">Role</label>
                        <select name="Role" id="Role" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="admin" {% if user.Role == 'admin' %}selected{% endif %}>Admin</option>
                            <option value="teacher" {% if user.Role == 'teacher' %}selected{% endif %}>Teacher</option>
                            <option value="student" {% if user.Role == 'student' %}selected{% endif %}>Student</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">{{ action }} User</button>
                        <a href="{{ url_for('manage_users') }}" class="btn back-btn mt-2">
                            <i class="bi bi-arrow-left"></i> Back to Manage Users
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ✅ Password toggle script -->
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('Password');
        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            togglePassword.classList.toggle('bi-eye');
            togglePassword.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
