<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback | LMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: #ffffff; /* Changed from purple gradient to white */
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 500px;
      width: 90%;
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      /* Added a slightly stronger shadow to define the box against the white background */
      box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
      text-align: center;
      border: 1px solid #f0f0f0;
    }
    h2 {
      margin-top: 0;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    form label {
      display: block;
      text-align: left;
      margin: 10px 0 5px;
      font-weight: 600;
      color: #34495e;
    }
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #eee;
      box-sizing: border-box;
      transition: border-color 0.3s;
      background: #fdfdfd;
    }
    textarea {
      resize: none;
      min-height: 100px;
    }
    input:focus, textarea:focus {
      border-color: #667eea;
      outline: none;
      background: #fff;
    }
    button {
      width: 100%;
      margin-top: 20px;
      background: #27ae60;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #1e874b;
    }
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
    }
    .back-btn:hover {
      color: #764ba2;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><i class="fas fa-star"></i> Rate Your Experience</h2>

    {% if success %}
      <div class="alert">✅ {{ success }}</div>
    {% endif %}

    <form method="POST">
      <label for="rating">Rating (1 to 5)</label>
      <input type="number" name="rating" min="1" max="5" placeholder="Enter rating" required>

      <label for="comments">Comments (optional)</label>
      <textarea name="comments" placeholder="Your feedback helps us improve!"></textarea>

      <button type="submit"><i class="fas fa-paper-plane"></i> Submit Feedback</button>
    </form>

    <a href="{{ url_for('student_dashboard') }}" class="back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
