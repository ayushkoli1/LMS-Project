<form method="POST">
    <input type="text" name="course" placeholder="Course Name">
    <input type="number" name="instructor_id" placeholder="Instructor ID">
    <select name="day">
        <option>Monday</option><option>Tuesday</option>... 
    </select>
    <input type="time" name="start_time">
    <input type="time" name="end_time">
    <input type="text" name="location" placeholder="Room/Link">
    <button type="submit">Add Timetable</button>
</form>
