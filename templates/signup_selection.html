<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Sign Up Role</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #7eb7ff, #e0e7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    .roles {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .role {
      text-align: center;
    }
    .role img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      box-shadow: 0 5px 10px rgba(0,0,0,0.15);
    }
    button {
      margin-top: 12px;
      background-color: #3f72af;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 15px;
    }
    button:hover {
      background-color: #2b4e86;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Select Your Role to Sign Up</h2>
    <div class="roles">
      <div class="role">
        <img src="https://cdn-icons-png.flaticon.com/512/201/201818.png" alt="Student">
        <form action="{{ url_for('signup') }}">
          <input type="hidden" name="role" value="student">
          <button type="submit">Student</button>
        </form>
      </div>
      <div class="role">
        <img src="https://cdn-icons-png.flaticon.com/512/921/921077.png" alt="Instructor">
        <form action="{{ url_for('signup') }}">
          <input type="hidden" name="role" value="instructor">
          <button type="submit">Instructor</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
