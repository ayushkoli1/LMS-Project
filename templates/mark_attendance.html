{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}

{% block content %}

<style>
.attendance-page {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 12px;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 16px;
  width: 380px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 10px;
}

.timer {
  font-size: 14px;
  color: #e74c3c;
  margin-bottom: 15px;
}

.otp-box {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.otp-box input {
  width: 45px;
  height: 50px;
  font-size: 20px;
  text-align: center;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.otp-box input:focus {
  border-color: #667eea;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.msg {
  margin-top: 15px;
  font-weight: 500;
}

.success { color: green; }
.error { color: red; }

.back-btn {
  display: inline-block;
  margin-top: 15px;
  text-decoration: none;
  color: #555;
  font-size: 14px;
}
</style>

<div class="attendance-page">
  <div class="card">
    
    <div class="title">📚 Mark Attendance</div>

    <!-- Timer -->
    <div class="timer">OTP expires in <span id="time">30</span>s</div>

    <form method="POST" onsubmit="return combineOTP()">

      <div class="otp-box">
        <input type="text" maxlength="1" oninput="move(this,1)">
        <input type="text" maxlength="1" oninput="move(this,2)">
        <input type="text" maxlength="1" oninput="move(this,3)">
        <input type="text" maxlength="1" oninput="move(this,4)">
        <input type="text" maxlength="1" oninput="move(this,5)">
        <input type="text" maxlength="1" oninput="move(this,6)">
      </div>

      <input type="hidden" name="otp" id="otp">

      <button type="submit">Submit</button>
    </form>

    <!-- Messages from backend -->
    {% if success %}
      <div class="msg success">✅ Attendance Marked Successfully</div>
    {% endif %}

    {% if error %}
      <div class="msg error">❌ {{ error }}</div>
    {% endif %}

    <a href="{{ url_for('student_dashboard') }}" class="back-btn">← Back to Dashboard</a>

  </div>
</div>

<script>
// Auto move cursor
function move(input, next) {
  if (input.value.length === 1) {
    let nextInput = document.querySelectorAll(".otp-box input")[next];
    if (nextInput) nextInput.focus();
  }
}

// Combine OTP
function combineOTP() {
  let inputs = document.querySelectorAll(".otp-box input");
  let otp = "";
  inputs.forEach(input => otp += input.value);
  document.getElementById("otp").value = otp;
  return true;
}

// Timer
let time = 30;
let timer = setInterval(() => {
  time--;
  document.getElementById("time").innerText = time;

  if (time <= 0) {
    clearInterval(timer);
    document.querySelector(".timer").innerText = "OTP expired ❌";
  }
}, 1000);
</script>

{% endblock %}
