<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Attendance</title>

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 380px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h2 { margin-bottom: 20px; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; }

  /* Success/Error Alerts */
  .alert {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 600;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

  .timer { font-weight: bold; margin-bottom: 15px; color: #555; font-size: 0.9rem; }
  .timer span { color: #e74c3c; }

  .otp-box {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
  }

  .otp-box input {
    width: 45px;
    height: 55px;
    font-size: 24px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #eee;
    background: #f9f9f9;
    transition: all 0.2s;
  }

  .otp-box input:focus {
    border-color: #667eea;
    background: white;
    outline: none;
    box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
  }

  button {
    width: 100%;
    padding: 14px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s, transform 0.1s;
    margin-bottom: 10px;
  }

  button:hover { background: #5a67d8; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #ccc; cursor: not-allowed; }

  .back-btn {
    display: inline-block;
    margin-top: 10px;
    color: #667eea;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s;
  }

  .back-btn:hover {
    color: #764ba2;
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="container">
  <h2>📚 Mark Attendance</h2>

  <!-- Messages only show if provided by Flask -->
  {% if success %}
    <div class="alert alert-success">✅ {{ success }}</div>
  {% elif error %}
    <div class="alert alert-error">❌ {{ error }}</div>
  {% endif %}

  <div class="timer" id="timer-container">
    OTP expires in <span id="time">60</span>s
  </div>

  <form id="otpForm" method="POST" onsubmit="return combineOTP()">
    <div class="otp-box">
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 0)" required>
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 1)" required>
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 2)" required>
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 3)" required>
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 4)" required>
      <input type="text" pattern="\d*" inputmode="numeric" maxlength="1" oninput="move(this, 5)" required>
    </div>

    <!-- Hidden field that Flask reads as 'otp' -->
    <input type="hidden" name="otp" id="otp_hidden">

    <button type="submit" id="submitBtn">Submit Attendance</button>
  </form>

  <a href="{{ url_for('student_dashboard') }}" class="back-btn">← Back to Dashboard</a>
</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");
const submitBtn = document.getElementById("submitBtn");

// Auto-focus move logic
function move(input, index) {
  if (input.value.length === 1 && index < 5) {
    inputs[index + 1].focus();
  }
}

// Better Backspace and Navigation handling
inputs.forEach((input, index) => {
  input.addEventListener('keydown', (e) => {
    if (e.key === "Backspace" && input.value === "" && index > 0) {
      inputs[index - 1].focus();
    }
  });
  
  // Clear field on focus for easier re-entry
  input.addEventListener('focus', () => input.select());
});

function combineOTP() {
  let otpValue = "";
  inputs.forEach(i => otpValue += i.value);
  
  if (otpValue.length < 6) {
    return false; 
  }
  
  document.getElementById("otp_hidden").value = otpValue;
  
  // Change button text to show activity
  submitBtn.innerText = "Verifying...";
  submitBtn.style.opacity = "0.7";
  
  return true; 
}

// Timer Logic
let time = 60;
const timerDisplay = document.getElementById("time");
const timerContainer = document.getElementById("timer-container");

let t = setInterval(() => {
  time--;
  if (timerDisplay) timerDisplay.innerText = time;
  
  if (time <= 0) {
    clearInterval(t);
    timerContainer.innerHTML = "<span style='color:red;'>OTP Expired ❌</span>";
    submitBtn.disabled = true;
  }
}, 1000);
</script>

</body>
</html>
