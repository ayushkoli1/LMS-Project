<!DOCTYPE html>
<html>
<head>
    <title>View Doubts - Instructor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Student Doubts</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Doubt</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            {% for record in records %}
            <tr>
                <td>{{ record.Name }}</td>
                <td>{{ record.Email }}</td>
                <td>{{ record.Doubt }}</td>
                <td>{{ record.Timestamp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('instructor_dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
</div>
</body>
</html>
