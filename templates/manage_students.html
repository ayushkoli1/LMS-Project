<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Students | LMS System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="text-success mb-4"><i class="bi bi-people-fill"></i> Manage Students</h2>

    {% if students %}
      <table class="table table-bordered table-striped">
        <thead class="table-success">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for student in students %}
            <tr>
              <td>{{ student.name }}</td>
              <td>{{ student.email }}</td>
              <td>{{ student.course }}</td>
              <td>
                <form action="{{ url_for('remove_student', student_id=student._id) }}" method="POST">
                  <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                </form>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No students enrolled yet.</p>
    {% endif %}

    <a href="{{ url_for('instructor_dashboard') }}" class="btn btn-secondary mt-3">⬅ Back to Dashboard</a>
  </div>
</body>
</html>
